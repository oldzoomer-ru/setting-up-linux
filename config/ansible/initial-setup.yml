---
- name: Universal Linux configuration for GNOME-based distros
  hosts: all
  become: true
  vars:
    openh264_flatpak_id: org.freedesktop.Platform.openh264
    zram_swap_size: "{{ ansible_memtotal_mb }}M"

  tasks:
    - name: Disable OpenH264 repo via dnf (Fedora)
      community.general.ini_file:
        path: /etc/yum.repos.d/fedora-cisco-openh264.repo
        section: fedora-cisco-openh264
        option: enabled
        value: "0"
        no_extra_spaces: true
        mode: "0644"
      when: ansible_distribution == "Fedora"

    - name: Load zram configuration
      ansible.builtin.include_role:
        name: rcrawf.zram

    - name: Load Flatpak configuration
      ansible.builtin.include_role:
        name: diademiemi.flatpak
      vars:
        flatpak_install_gnome: true

    - name: Load RPM Fusion configuration (Only for RedHat/Fedora)
      ansible.builtin.include_role:
        name: egdoc.rpmfusion
      vars:
        rpmfusion_enable_nonfree_repo: true
      when: ansible_os_family == "RedHat"

    - name: Mask OpenH264 in Flatpak (system-wide)
      ansible.builtin.command: flatpak mask {{ openh264_flatpak_id }} --system
      environment:
        LANG: C.UTF-8
      register: flatpak_mask_result
      changed_when: "'is already masked' not in flatpak_mask_result.stderr"
      failed_when: flatpak_mask_result.rc != 0 and 'is already masked' not in flatpak_mask_result.stderr

    - name: Install Microsoft Core Fonts (Debian)
      when: ansible_os_family == "Debian"
      block:
        - name: Pre-seed ttf-mscorefonts-installer EULA acceptance
          ansible.builtin.debconf:
            name: ttf-mscorefonts-installer
            question: msttcorefonts/accepted-mscorefonts-eula
            value: "true"
            vtype: boolean
        - name: Install ttf-mscorefonts-installer package
          ansible.builtin.apt:
            name: ttf-mscorefonts-installer
            state: present

    - name: Install Microsoft Core Fonts (RedHat via RPM Fusion)
      ansible.builtin.dnf:
        name:
          - lpf-mscore-fonts
          - lpf-cleartype-fonts
        state: present
      when: ansible_os_family == "RedHat"

    - name: Install multimedia codecs (Debian)
      ansible.builtin.apt:
        name:
          - gstreamer1.0-plugins-base
          - gstreamer1.0-plugins-good
          - gstreamer1.0-plugins-bad
          - gstreamer1.0-plugins-ugly
          - gstreamer1.0-libav
          - libavcodec-extra
        state: present
      when: ansible_os_family == "Debian"

    - name: Install multimedia codecs (RedHat/Fedora via RPM Fusion)
      ansible.builtin.dnf:
        name:
          - gstreamer1-plugins-base
          - gstreamer1-plugins-good
          - gstreamer1-plugins-bad-free
          - gstreamer1-plugins-ugly
          - gstreamer1-libav
        state: present
      when: ansible_os_family == "RedHat"

    - name: Apply sysctl kernel parameters
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: true
      loop:
        - name: vm.swappiness
          value: "10"
        - name: vm.vfs_cache_pressure
          value: "50"
        - name: kernel.sysrq
          value: "1"
        - name: net.core.default_qdisc
          value: fq
        - name: net.ipv4.tcp_congestion_control
          value: bbr
