services:
  llama-backend:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda13
    container_name: llama-backend
    ports:
      - "3001:8080"
    volumes:
      - hf-cache:/root/.cache/huggingface
      - ./models.ini:/presets/models.ini:ro
    command: --models-preset /presets/models.ini --no-ui
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai-network
    restart: unless-stopped

  playwright-backend:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    container_name: playwright-backend
    command: npx -y playwright@1.60.0 run-server --port 3000 --host 0.0.0.0
    networks:
      - ai-network
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://llama-backend:8080/v1
      - OPENAI_API_KEY=none
      - WEB_LOADER_ENGINE=playwright
      - PLAYWRIGHT_WS_URL=ws://playwright-backend:3000
    volumes:
      - webui-data:/app/backend/data
    depends_on:
      - llama-backend
      - playwright-backend
    networks:
      - ai-network
    restart: unless-stopped

networks:
  ai-network:
    driver: bridge

volumes:
  hf-cache:
  webui-data: