---
- name: Universal Linux configuration for GNOME-based distros
  hosts: all
  become: true
  vars:
    # === Repos & Packages ===
    flathub_url: https://dl.flathub.org/repo/flathub.flatpakrepo
    # === OpenH264 ===
    openh264_flatpak_id: org.freedesktop.Platform.openh264
  tasks:
    - name: Install base packages (Debian)
      ansible.builtin.apt:
        name:
          - flatpak
          - gnome-software-plugin-flatpak
          - wget
          - curl
          - git
          - tree
          - build-essential
          - timeshift
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"
    - name: Install base packages (RedHat)
      ansible.builtin.dnf:
        name:
          - flatpak
          - wget
          - curl
          - git
          - tree
          - timeshift
        state: present
      when: ansible_os_family == "RedHat"
    - name: Install RPM Fusion repositories (Fedora)
      ansible.builtin.dnf:
        name:
          - https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_distribution_major_version }}.noarch.rpm
          - https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_distribution_major_version }}.noarch.rpm
        state: present
        disable_gpg_check: true
      when: ansible_distribution == "Fedora"
    - name: Refresh DNF cache (RedHat/Fedora)
      ansible.builtin.command: dnf makecache
      changed_when: false
      when: ansible_os_family == "RedHat"
    - name: Disable OpenH264 repo via dnf (Fedora)
      community.general.ini_file:
        path: /etc/yum.repos.d/fedora-cisco-openh264.repo
        section: fedora-cisco-openh264
        option: enabled
        value: "0"
        no_extra_spaces: true
        mode: "0644"
      when: ansible_distribution == "Fedora"
    - name: Check if Flatpak is installed
      ansible.builtin.package_facts:
        manager: auto
      changed_when: false
    - name: Add Flathub remote with verified subset (system-wide)
      ansible.builtin.command: >
        flatpak remote-add --if-not-exists --system --subset=verified flathub {{ flathub_url }}
      register: flathub_add_result
      changed_when: "'Already added' not in flathub_add_result.stdout"
      failed_when: flathub_add_result.rc != 0 and 'Already added' not in flathub_add_result.stderr
    - name: Check current OpenH264 mask status (Flatpak)
      ansible.builtin.command: flatpak info --show-ref {{ openh264_flatpak_id }} --system
      register: openh264_info
      changed_when: false
      failed_when: false
      when:
        - "'flatpak' in ansible_facts.packages"
        - ansible_virtualization_type != "docker"
    - name: Mask OpenH264 in Flatpak (system-wide)
      ansible.builtin.command: flatpak mask {{ openh264_flatpak_id }} --system
      environment:
        LANG: C.UTF-8
      register: flatpak_mask_result
      changed_when: "'is already masked' not in flatpak_mask_result.stderr"
      failed_when: flatpak_mask_result.rc != 0 and 'is already masked' not in flatpak_mask_result.stderr
      when:
        - ansible_virtualization_type != "docker"
    - name: Install Microsoft Core Fonts (Debian)
      when: ansible_os_family == "Debian"
      block:
        - name: Pre-seed ttf-mscorefonts-installer EULA acceptance
          ansible.builtin.debconf:
            name: ttf-mscorefonts-installer
            question: msttcorefonts/accepted-mscorefonts-eula
            value: "true"
            vtype: boolean
        - name: Install ttf-mscorefonts-installer package
          ansible.builtin.apt:
            name: ttf-mscorefonts-installer
            state: present
    - name: Install Microsoft Core Fonts (RedHat via RPM Fusion)
      ansible.builtin.dnf:
        name:
          - lpf-mscore-fonts
          - lpf-cleartype-fonts
        state: present
      when: ansible_os_family == "RedHat"
    - name: Install multimedia codecs (Debian)
      ansible.builtin.apt:
        name:
          - gstreamer1.0-plugins-base
          - gstreamer1.0-plugins-good
          - gstreamer1.0-plugins-bad
          - gstreamer1.0-plugins-ugly
          - gstreamer1.0-libav
          - libavcodec-extra
        state: present
      when: ansible_os_family == "Debian"
    - name: Install multimedia codecs (RedHat/Fedora via RPM Fusion)
      when: ansible_os_family == "RedHat"
      ansible.builtin.dnf:
        name:
          - gstreamer1-plugins-base
          - gstreamer1-plugins-good
          - gstreamer1-plugins-bad-free
          - gstreamer1-plugins-ugly
          - gstreamer1-libav
        state: present
