---
- name: Deploy custom keyboard mappings (hwdb + keyd)
  hosts: all
  become: true
  tasks:
    - name: Deploy hwdb rule for Gigabyte keyboard
      ansible.builtin.copy:
        content: |
          evdev:input:b0003v0414p8104e0111*
           KEYBOARD_KEY_7006f=fn
           KEYBOARD_KEY_70067=www
        dest: /etc/udev/hwdb.d/99-gigabyte.hwdb
        owner: root
        group: root
        mode: "0644"
    - name: Update hwdb cache
      ansible.builtin.command: systemd-hwdb update
      changed_when: false
    - name: Trigger udev reload
      ansible.builtin.command: udevadm trigger
      changed_when: false
    - name: Ensure keyd config directory exists
      ansible.builtin.file:
        path: /etc/keyd
        state: directory
        owner: root
        group: root
        mode: "0755"
    - name: Remove old keyd configs
      ansible.builtin.file:
        path: "/etc/keyd/{{ item }}"
        state: absent
      loop:
        - copilot.conf
        - screenshot.conf
    - name: Deploy keyd unified config
      ansible.builtin.copy:
        content: |
          [ids]
          *

          [main]
          # Аккорд для Скриншота (на базе S, Shift, Meta)
          s+leftshift+leftmeta = print

          # Кнопка Copilot активирует слой для GoldED
          f23+leftshift+leftmeta = layer(fido)

          [fido]
          i = insert
          w = f2
        dest: /etc/keyd/default.conf
        owner: root
        group: root
        mode: "0644"
    - name: Restart keyd if running
      ansible.builtin.systemd:
        name: keyd
        state: restarted
      failed_when: false
